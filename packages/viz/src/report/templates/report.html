<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardPick 분석 보고서</title>
  <style>
    :root {
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-primary: #2563eb;
      --color-primary-light: #dbeafe;
      --color-success: #16a34a;
      --color-success-light: #dcfce7;
      --color-warning: #ca8a04;
      --color-warning-light: #fef9c3;
      --color-danger: #dc2626;
      --color-danger-light: #fee2e2;
      --radius: 0.5rem;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--color-primary);
      padding-bottom: 1rem;
    }

    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    header p.subtitle {
      color: var(--color-text-muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .metric-card {
      background: var(--color-primary-light);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }

    .metric-card .label {
      font-size: 0.75rem;
      color: var(--color-primary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-top: 0.25rem;
    }

    .metric-card .sub {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      margin-top: 0.125rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      background: var(--color-bg);
    }

    th {
      padding: 0.625rem 0.75rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      border-bottom: 2px solid var(--color-border);
    }

    th.right, td.right { text-align: right; }
    th.center, td.center { text-align: center; }

    td {
      padding: 0.625rem 0.75rem;
      border-bottom: 1px solid var(--color-border);
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: var(--color-bg); }

    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-success { background: var(--color-success-light); color: var(--color-success); }
    .badge-warning { background: var(--color-warning-light); color: var(--color-warning); }
    .badge-danger  { background: var(--color-danger-light);  color: var(--color-danger); }

    .highlight-row td { background: var(--color-success-light); font-weight: 600; }

    .warn-box {
      background: var(--color-warning-light);
      border: 1px solid var(--color-warning);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      font-size: 0.875rem;
    }

    .warn-box p { margin-top: 0.25rem; }

    footer {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.75rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--color-border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CardPick 분석 보고서</h1>
      <p class="subtitle">생성일: {{GENERATED_DATE}}</p>
    </header>

    <!-- Summary metrics -->
    <div class="section">
      <h2>핵심 지표</h2>
      {{SUMMARY}}
    </div>

    <!-- Category breakdown -->
    <div class="section">
      <h2>카테고리별 지출 내역</h2>
      {{CATEGORY_TABLE}}
    </div>

    <!-- Card comparison -->
    <div class="section">
      <h2>카드별 혜택 비교</h2>
      {{CARD_COMPARISON}}
    </div>

    <!-- Recommended assignments -->
    <div class="section">
      <h2>최적 카드 배정</h2>
      {{ASSIGNMENTS}}
    </div>

    <footer>
      <p>CardPick — 한국 신용카드 최적화 도구 &nbsp;|&nbsp; 본 보고서는 참고용으로만 활용하십시오.</p>
    </footer>
  </div>
</body>
</html>
