    type: points
    tiers:
      - performanceTier: tier0
        rate: 1.0
        monthlyCap: null
        perTransactionCap: null
      - performanceTier: tier1
        rate: 2.0
        monthlyCap: null
        perTransactionCap: null
    conditions:
      note: "대중교통 에코포인트 적립"

  - category: uncategorized
    type: points
    tiers:
      - performanceTier: tier0
        rate: 0.5
        monthlyCap: null
        perTransactionCap: null
      - performanceTier: tier1
        rate: 1.0
        monthlyCap: null
        perTransactionCap: null
    conditions:
      note: "친환경 소비 에코포인트 적립 (전기차 충전, 자전거 대여 등)"

  - category: grocery
    subcategory: supermarket
    type: points
    tiers:
      - performanceTier: tier0
        rate: 1.0
        monthlyCap: null
