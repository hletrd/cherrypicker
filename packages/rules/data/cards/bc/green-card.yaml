  issuer: bc
  name: BC Green Card
  nameKo: BC카드 그린카드
  type: credit
  annualFee:
    domestic: 10000
    international: 10000
  url: https://www.bccard.com/app/card/CreditCardMain.do
  lastUpdated: "2026-03-25"
  source: manual

performanceTiers:
  - id: tier0
    label: 무실적
    minSpending: 0
    maxSpending: 299999

  - id: tier1
    label: 전월 30만원 이상
    minSpending: 300000
    maxSpending: null

performanceExclusions:
  - tax_payment
  - gift_card

rewards:
